<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ms. Liu — Math Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #f7f5f0;
    --card:   #ffffff;
    --border: #e4e0d8;
    --text:   #1a1814;
    --muted:  #7a7670;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .hero {
    background: var(--text);
    color: #f7f5f0;
    padding: 1.6rem 2rem 1.4rem;
    text-align: center;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #f7f5f0;
    line-height: 1.2;
  }

  .hero h1 em { font-style: italic; font-weight: 400; }

  .main {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.2rem 4rem;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 1px;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    background: var(--border);
  }

  .card {
    background: var(--card);
    opacity: 0;
    transform: translateY(10px);
    animation: fadeUp 0.35s ease forwards;
  }
  .card:first-child { border-radius: 14px 14px 0 0; }
  .card:last-child  { border-radius: 0 0 14px 14px; }
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }
  .card:nth-child(5) { animation-delay: 0.25s; }

  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .card a {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 1rem 1.3rem;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
  }
  .card a:hover { background: #faf8f4; }

  .card-graph {
    flex: 0 0 48px;
    height: 48px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #faf8f4;
    overflow: hidden;
  }
  .card-graph canvas { display: block; }

  .card-meta { flex: 1; min-width: 0; }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 2px;
  }

  .card-eq {
    font-family: 'DM Mono', monospace;
    font-size: 0.73rem;
    color: var(--muted);
  }

  .card-chevron {
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .footer {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: #b0ada6;
    padding-bottom: 2rem;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div class="hero">
  <h1>Ms. Liu · <em>Math Tools</em></h1>
</div>

<div class="main">
  <div class="section-label">Topics</div>

  <div class="cards">
    <div class="card">
      <a href="linear_explorer.html">
        <div class="card-graph"><canvas id="g0" width="48" height="48"></canvas></div>
        <div class="card-meta">
          <div class="card-title">Linear Functions</div>
          <div class="card-eq">y = mx + b</div>
        </div>
        <div class="card-chevron">›</div>
      </a>
    </div>

    <div class="card">
      <a href="quadratic_explorer.html">
        <div class="card-graph"><canvas id="g1" width="48" height="48"></canvas></div>
        <div class="card-meta">
          <div class="card-title">Quadratic Functions</div>
          <div class="card-eq">y = a(k(x − d))² + c</div>
        </div>
        <div class="card-chevron">›</div>
      </a>
    </div>

    <div class="card">
      <a href="exponential_explorer.html">
        <div class="card-graph"><canvas id="g2" width="48" height="48"></canvas></div>
        <div class="card-meta">
          <div class="card-title">Exponential Functions</div>
          <div class="card-eq">y = a · bˣ</div>
        </div>
        <div class="card-chevron">›</div>
      </a>
    </div>

    <div class="card">
      <a href="log_explorer.html">
        <div class="card-graph"><canvas id="g3" width="48" height="48"></canvas></div>
        <div class="card-meta">
          <div class="card-title">Logarithmic Functions</div>
          <div class="card-eq">y = a · log(x − h) + k</div>
        </div>
        <div class="card-chevron">›</div>
      </a>
    </div>

    <div class="card">
      <a href="trig_explorer.html">
        <div class="card-graph"><canvas id="g4" width="48" height="48"></canvas></div>
        <div class="card-meta">
          <div class="card-title">Trigonometric Ratios</div>
          <div class="card-eq">sin θ · cos θ · tan θ</div>
        </div>
        <div class="card-chevron">›</div>
      </a>
    </div>
  </div>
</div>

<div class="footer">Ms. Liu · Math Tools</div>

<script>
function drawPreview(id, fn, color) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height, pad = 5;
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(0,0,0,0.07)'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(W/2,pad); ctx.lineTo(W/2,H-pad); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pad,H/2); ctx.lineTo(W-pad,H/2); ctx.stroke();
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
  ctx.beginPath();
  let pen = false;
  for (let px = pad; px <= W-pad; px++) {
    const x = (px - W/2) / (W/2 - pad) * 4;
    const y = fn(x);
    if (!isFinite(y) || Math.abs(y) > 4.5) { pen = false; continue; }
    const sy = H/2 - y/4*(H/2-pad);
    if (!pen) { ctx.moveTo(px, sy); pen = true; }
    else ctx.lineTo(px, sy);
  }
  ctx.stroke();
}

function drawCircle() {
  const canvas = document.getElementById('g4');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, R = W/2-5;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-R,cy); ctx.lineTo(cx+R,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-R); ctx.lineTo(cx,cy+R); ctx.stroke();
  const a=Math.PI/4, px=cx+Math.cos(a)*R, py=cy-Math.sin(a)*R;
  ctx.strokeStyle='#185FA5'; ctx.lineWidth=1.5; ctx.setLineDash([3,2]);
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(px,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px,cy); ctx.lineTo(px,py); ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='#993C1D'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(px,py); ctx.stroke();
  ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2);
  ctx.fillStyle='#e24b4a'; ctx.fill();
}

drawPreview('g0', x => x,                        '#185FA5');
drawPreview('g1', x => x*x - 1,                  '#0F6E56');
drawPreview('g2', x => Math.pow(2,x)/4,           '#854F0B');
drawPreview('g3', x => x<=-3.9?null:Math.log10(x+4)*2-1.2, '#993C1D');
drawCircle();
</script>
</body>
</html>
